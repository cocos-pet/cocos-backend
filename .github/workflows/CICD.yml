name: CI/CD for prod

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # 브랜치 필터링 확인
      - name: Validate branch for tag
        run: |
          echo "Checking if tag is from the main branch..."
          git fetch origin main --depth=1
          COMMIT_HASH=$(git rev-parse HEAD)
          MAIN_HASH=$(git rev-parse origin/main)
          if [ "$COMMIT_HASH" != "$MAIN_HASH" ]; then
            echo "Tag is not from the main branch. Exiting workflow."
            exit 1
          fi

      - name: create application.yml
        run: |
          mkdir ./src/main/resources
          cd ./src/main/resources
          
          touch ./application.yml
          echo "${{ secrets.APPLICATION_YML }}" >> ./application.yml

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle Wrapper
        run: ./gradlew -x test build

      - name: docker image build
        run: docker build --no-cache -f Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/cocos .

      - name: docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Docker Hub push
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/cocos

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            echo "Starting deployment..."
            chmod +x /home/ubuntu/deploy.sh 
            /home/ubuntu/deploy.sh
