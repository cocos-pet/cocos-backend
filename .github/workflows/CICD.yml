name: CI/CD for prod

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # 브랜치 필터링 확인
      - name: Validate branch for tag
        run: |
          echo "Checking if tag is from the prod branch..."
          git fetch origin prod --depth=1
          COMMIT_HASH=$(git rev-parse HEAD)
          PROD_HASH=$(git rev-parse origin/prod)
          if [ "$COMMIT_HASH" != "$PROD_HASH" ]; then
            echo "Tag is not from the prod branch. Exiting workflow."
            exit 1
          fi

      - name: create application.yml
        run: |
          mkdir -p ./src/main/resources
          cd ./src/main/resources
          
          touch ./application.yml
          echo "${{ secrets.APPLICATION_YML }}" >> ./application.yml

      - name: docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cocos
          build-args: |
            SPRING_PROFILES_ACTIVE=prod
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/cocos:buildcache-prod
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/cocos:buildcache-prod,mode=max

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            echo "Starting deployment..."
            chmod +x /home/ubuntu/deploy.sh 
            /home/ubuntu/deploy.sh
