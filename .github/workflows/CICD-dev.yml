name: CI/CD for dev

on:
  push:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: create application.yml
        run: |
          mkdir -p ./src/main/resources
          cd ./src/main/resources
          
          touch ./application.yml
          echo "${{ secrets.APPLICATION_YML_DEV }}" >> ./application.yml

      - name: docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_DEV }}
          password: ${{ secrets.DOCKERHUB_PASSWORD_DEV }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME_DEV }}/cocos
          build-args: |
            SPRING_PROFILES_ACTIVE=dev
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME_DEV }}/cocos:buildcache-dev
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME_DEV }}/cocos:buildcache-dev,mode=max

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_DEV }}
          username: ${{ secrets.EC2_USER_DEV }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY_DEV }}
          script: |
            echo "Starting deployment..."
            chmod +x /home/ubuntu/deploy.sh 
            /home/ubuntu/deploy.sh
