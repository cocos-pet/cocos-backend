name: CI/CD for dev

on:
  push:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: create application.yml
        run: |
          mkdir ./src/main/resources
          cd ./src/main/resources
          
          touch ./application.yml
          echo "${{ secrets.APPLICATION_YML_DEV }}" >> ./application.yml

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle Wrapper
        run: ./gradlew -x test build

      - name: docker image build
        run: docker build --no-cache -f Dockerfile-dev -t ${{ secrets.DOCKERHUB_USERNAME }}/cocos-dev .

      - name: docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Docker Hub push
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/cocos-dev

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_DEV }}
          username: ${{ secrets.EC2_USER_DEV }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY_DEV }}
          script: |
            echo "Starting deployment..."
            chmod +x /home/ubuntu/deploy.sh 
            /home/ubuntu/deploy.sh
