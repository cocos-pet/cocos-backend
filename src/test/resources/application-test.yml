spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

  flyway:
    enabled: false

api:
  prefix: /api/test

test:
  auth-secret:

aws:
  access-key:
  secret-key:
  region: ap-northeast-2
  app-data-s3-bucket-name:
  member-data-s3-bucket-name:

kakao:
  client-id:
  redirect-url:
  admin-key:

jwt:
  secret:
